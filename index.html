<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <title>LUVI BI — Portal de Indicadores</title>
    <meta name="description" content="Portal mobile de indicadores e dashboards LUVI BI." />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#0A467C" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LUVI BI" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Fonts: Inter para toda a interface (hierarquia via peso/tracking, não
         via mistura de famílias); JetBrains Mono reservado para a tag técnica -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />

    <!-- Google AdSense: carregado direto no <head>, como o Google recomenda,
         em vez de só via JS — ajuda na verificação do site e em Auto ads.
         O bloco de anúncio em si (<ins>) é renderizado pelo componente
         AdSlot na Home. -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5226466925670263"
     crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
